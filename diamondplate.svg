<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <rect width="80" height="80" fill="#b8b8b8"/>
  <!-- row 1 -->
  <g transform="translate(20,15) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <g transform="translate(60,15) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <!-- row 2 offset -->
  <g transform="translate(0,35) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <g transform="translate(40,35) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <g transform="translate(80,35) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <!-- row 3 -->
  <g transform="translate(20,55) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <g transform="translate(60,55) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <!-- row 4 offset -->
  <g transform="translate(0,75) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <g transform="translate(40,75) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <g transform="translate(80,75) rotate(-30)">
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#d0d0d0"/>
    <polygon points="0,-8 3,0 0,0 -3,0" fill="#e0e0e0"/>
    <polygon points="0,-7 2,0 0,0 -2,0" fill="#eee" opacity="0.6"/>
  </g>
  <!-- shadows under each diamond -->
  <g opacity="0.25">
    <ellipse cx="20" cy="20" rx="4" ry="2" fill="#666" transform="rotate(-30,20,20)"/>
    <ellipse cx="60" cy="20" rx="4" ry="2" fill="#666" transform="rotate(-30,60,20)"/>
    <ellipse cx="0" cy="40" rx="4" ry="2" fill="#666" transform="rotate(-30,0,40)"/>
    <ellipse cx="40" cy="40" rx="4" ry="2" fill="#666" transform="rotate(-30,40,40)"/>
    <ellipse cx="80" cy="40" rx="4" ry="2" fill="#666" transform="rotate(-30,80,40)"/>
    <ellipse cx="20" cy="60" rx="4" ry="2" fill="#666" transform="rotate(-30,20,60)"/>
    <ellipse cx="60" cy="60" rx="4" ry="2" fill="#666" transform="rotate(-30,60,60)"/>
    <ellipse cx="0" cy="80" rx="4" ry="2" fill="#666" transform="rotate(-30,0,80)"/>
    <ellipse cx="40" cy="80" rx="4" ry="2" fill="#666" transform="rotate(-30,40,80)"/>
    <ellipse cx="80" cy="80" rx="4" ry="2" fill="#666" transform="rotate(-30,80,80)"/>
  </g>
